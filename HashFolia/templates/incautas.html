{% extends 'esqueleto.html' %}
{% block conteudo %}
  <div class="container-fluid">
    <div class="row topo">
      <!-- Banner principal-->
      <div class="col-md-offset-6 col-md-12 text-center">
        <img style="width: 300px;" src="EnsaioDoBlouco.png" />
      </div>
    </div>
	<h1>Transmissão do Trio</h1>
	<div class="card">
		<div class="card-header">
		  Destaque
		</div>
		<div class="card-body">
		  <h5 class="card-title"></h5>
		  <iframe width="460" height="315" src="https://www.youtube.com/embed/{{ transmissao }}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
		</div>
	  </div>
	  <br>
    <div class="row blouco">
      <!-- Chat -->
      <div class="papo col-xs-7 col-md-12 embed-responsive embed-responsive-1by1">
		  <iframe class="embed-responsive-item"src="https://kiwiirc.com/nextclient/chat.freenode.org/#{{ papo }}"
          style="border:5; width:100%; height:100%;"></iframe>
      </div>
    </div>
  </div>
{% endblock %}
