{% extends 'esqueleto.html' %}
{% block conteudo %}
  <div class="container-fluid">
    {% if seed %}
    <div class="row topo">
		  <!-- Banner principal-->
		  <div class="col-md-offset-6 col-md-12 text-center">
			  <img style="width: 300px;" src="{{ pag_imagem }}" />
			  <p>{{ seed }}</p>
		  </div>
    </div>
	{% endif %}
	<h1>Porta-estandarte </h1>

	<div class="card">
		<div class="card-header">
		  Estandarte
		</div>
		<div class="card-body">
		  <div class="etherpad-embed">
			  <iframe name="embed_readwrite" src="https://pad.bloucos.art/p/Blouco_{{ estandarte }}?showControls=true&showChat=true&showLineNumbers=true&useMonospaceFont=false" width="100%" height="400" frameborder="0"></iframe>
		  </div>
		</div>
	  </div>
	  <br>
    <div class="row bonde">
	<h1><a href="https://meet.jit.si/Blouco_{{bonde}}">Bonde</a></h1>
      <div id="bonde" class="embed-responsive embed-responsive-1by1">
		<script src="https://meet.jit.si/external_api.js"></script>
		<script>
			var domain = "meet.jit.si";
			var options = {
				roomName: "Blouco_{{bonde}}",
				width: "100%",
				height: 600,
				parentNode: document.querySelector('#bonde'),
				configOverwrite: {},
				interfaceConfigOverwrite: {}
			}
			var api = new JitsiMeetExternalAPI(domain, options);
		</script>
      </div>
    </div>
  </div>
{% endblock %}
