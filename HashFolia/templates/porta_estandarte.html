{% extends 'esqueleto.html' %}
{% block conteudo %}


<!--Plano de Fundo-->
<style type="text/css">
	body {
		background-color: #1e88e5;
	}
</style>

<!-- Conteúdo -->

<div class="container-fluid">
	{% if seed %}
	<div class="row topo">

		<!-- Banner principal-->
		<div class="container-fluid">
			<div class="jumbotron jumbotron-fluid m-5 p-5 bg-transparent text-white">
				<div class="container-fluid  text-center">
					<img style="width: 25%" src="{{ pag_imagem }}" />
					<p>{{ seed }}</p>
					{% endif %}
				</div>
			</div>
		</div>

		<!-- Estandarte -->
		<div class="container-fluid">
			<div class="jumbotron jumbotron-fluid m-3 p-4 bg-dark text-white">
				<h2 class="display-5" id="gerarHash"><b>Porta-estandarte</b></h2>
				<hr class="my-4 bg-light">
				<div class="card">
					<div class="card-header bg-dark">
						<h4>Fluxo da Atividade</h4>
					</div>
				</div>
				<div class="card-body">
					<div class="etherpad-embed">
						<iframe name="embed_readwrite"
							src="https://pad.bloucos.art/p/Blouco_{{ estandarte }}?showControls=true&showChat=true&showLineNumbers=true&useMonospaceFont=false"
							width="100%" height="400px" frameborder="0"></iframe>
					</div>
				</div>
				<h2 class="display-5" id="gerarHash"><b><a class="text-light"
							href="https://meet.jit.si/Blouco_{{bonde}}">Bonde</a></b></h2>
				<hr class="my-4 bg-light">
				<div id="bonde" class="embed-responsive embed-responsive-4by3">
					<script src="https://meet.jit.si/external_api.js"></script>
					<script>
						var domain = "meet.jit.si";
						var options = {
							roomName: "Blouco_{{bonde}}",
							width: "100%",
							height: "100%",
							parentNode: document.querySelector('#bonde'),
							configOverwrite: {},
							interfaceConfigOverwrite: {}
						}
						var api = new JitsiMeetExternalAPI(domain, options);
					</script>
				</div>
			</div>
		</div>
		{% endblock %}
	</div>
</div>

<!--Rodapé-->
<div class="container-fluid">
	<div class="jumbotron jumbotron-fluid bg-transparent text-white ">
		<div class="container-fluid text-right">
			<h6 class="display-6"><a href="#" class="badge badge-dark">Topo ↑</a></h6>
		</div>
	</div>
</div>
