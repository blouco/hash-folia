<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<title>HashFolia! - {{ seed }}</title>
	<meta property="og:title" content="Hashfolia: {{ seed }}">
	<meta property="og:description" content="Hashfolia: {{ seed }}">
	<meta property="og:image"
		  content="/{{ seed }}.png">
	<meta property="og:url"
		  content="https://blouco.volooptaz.art">
	<!-- Bootstrap core CSS -->
	<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">

	<style type="text/css">
	body {
		background-color: #ff00ff;
	}
	h1, h2, h3 {
		text-align: center;
	}
	</style>
</head>
<body>
<h1>Hash Folia! - {{ seed }}</h1>
<div class="container">
    <div class="row estandarte">
        <div class="senhas-e-arcanos">


		<h2>Senhas</h2>

		<ul>
			{% for palavra in palavras %}
			<li>{{ palavra }}</li>
			{% endfor %}
		</ul>

		<h2>Arcanos</h2>
		<ul>
			<li>{{ taro.0.name }}</li>
			<li>{{ taro.1.name }}</li>
		</ul>
		</div>
        <div class="hash col-xs-6">
		<h2>Imagem</h2>

		<img src="/{{ seed }}.png" />
		</div>
    </div>
</div>

  <!-- Bootstrap core JavaScript -->
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

</body>
</html>
